<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>lightbox-masonry-gallery</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:74px;gap:8px}
 .th{border-radius:10px;overflow:hidden;cursor:pointer;position:relative;transition:transform .2s}
 .th:hover{transform:scale(1.03)}
 .th .filler{height:100%;border-radius:0}
 .th.wide{grid-column:span 2}.th.tall{grid-row:span 2}
 .th .cap{position:absolute;left:0;right:0;bottom:0;padding:10px 8px 6px;font-family:var(--mono);font-size:9px;
   letter-spacing:.1em;color:var(--frost);background:linear-gradient(to top,rgba(3,10,18,.85),transparent)}
 .box{position:fixed;inset:0;background:rgba(3,10,18,.86);backdrop-filter:blur(9px);display:none;
   align-items:center;justify-content:center;z-index:5}
 .box.on{display:flex;animation:fi .3s}@keyframes fi{from{opacity:0}}
 .box .big-img{width:min(66vw,400px);height:280px;border-radius:14px}
 .nav{position:absolute;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:26px;color:var(--ice);cursor:pointer;
   padding:0 16px;user-select:none;filter:drop-shadow(0 0 8px rgba(47,224,255,.5))}
 .nav.prev{left:2%}.nav.next{right:2%}
 .cls{position:absolute;top:16px;right:22px;font-family:var(--mono);color:var(--ice);cursor:pointer;font-size:16px}
 .cap2{position:absolute;bottom:26px;font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--ice)}
</style></head>
<body class="demo"><div class="demo-name">f · lightbox-masonry-gallery</div>
<div class="stage" id="grid"></div>
<div class="box" id="box">
  <span class="cls" id="cls">✕ esc</span>
  <span class="nav prev" id="prev">‹</span>
  <div class="big-img filler eel"><span class="tag" id="tg">01</span></div>
  <span class="nav next" id="next">›</span>
  <div class="cap2" id="cap2">Portfolio · 01 / 08</div>
</div>
<script>
const data=['Aerial estate','Modern deck','Courtyard','Poolside','Rooftop','Front lawn','Putting green','Balcony'];
const spans=['wide','','tall','','','wide','','tall'];
const grid=document.getElementById('grid'),box=document.getElementById('box'),tg=document.getElementById('tg'),cap2=document.getElementById('cap2');
let cur=0;
data.forEach((d,i)=>{const t=document.createElement('div');t.className='th frost'+(spans[i]?' '+spans[i]:'');
 t.innerHTML=`<div class="filler eel"></div><div class="cap">${d}</div>`;
 t.onclick=()=>open(i);grid.appendChild(t);});
function open(i){cur=(i+8)%8;tg.textContent=String(cur+1).padStart(2,'0');
 cap2.textContent=`${data[cur]} · ${String(cur+1).padStart(2,'0')} / 08`;box.classList.add('on');}
document.getElementById('prev').onclick=e=>{e.stopPropagation();open(cur-1);};
document.getElementById('next').onclick=e=>{e.stopPropagation();open(cur+1);};
box.onclick=e=>{if(e.target===box||e.target.id==='cls')box.classList.remove('on');};
addEventListener('keydown',e=>{if(!box.classList.contains('on'))return;
 if(e.key==='Escape')box.classList.remove('on');if(e.key==='ArrowLeft')open(cur-1);if(e.key==='ArrowRight')open(cur+1);});
// auto-demo
let auto=0;setInterval(()=>{if(box.classList.contains('on')){open(cur+1);}else if(auto%2===0){open(0);}else{box.classList.remove('on');}auto++;},2400);
</script></body></html>
