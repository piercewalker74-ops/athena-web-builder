<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>pain-point-cards</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;flex-direction:column;gap:12px}
 .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
 @media(max-width:480px){.grid{grid-template-columns:1fr}.grid>:nth-child(n+4){display:none}}
 .card{display:flex;gap:12px;padding:16px 15px;border-radius:12px;opacity:0;transform:translateY(20px) scale(.97);
   transition:all .6s cubic-bezier(.2,.8,.2,1)}
 .card.in{opacity:1;transform:none}
 .ic{flex:0 0 auto;width:40px;height:40px;border-radius:10px;display:grid;place-items:center;
   background:var(--glass2);border:1px solid var(--line2)}
 .ic svg{width:22px;height:22px;stroke:var(--cyan);stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
 .card h3{font-size:15px;font-weight:650;line-height:1.15}
 .card p{font-size:11.5px;color:var(--ice);opacity:.78;margin-top:5px;line-height:1.45}
</style></head>
<body class="demo"><div class="demo-name">f · pain-point-cards</div>
<div class="stage">
  <div class="eyebrow">SOUND FAMILIAR?</div>
  <div class="grid" id="g"></div>
</div>
<script>
const P=[
 ['Green, cloudy pool?','Algae takes hold fast. We balance, shock and clear it — then keep it swim-ready weekly.','<path d="M4 15c2-1 4 1 8 0s4-1 8 0"/><path d="M4 19c2-1 4 1 8 0s4-1 8 0"/><path d="M12 3c3 4 4 6 4 8a4 4 0 01-8 0c0-2 1-4 4-8z"/>'],
 ['Selling your car?','A pro detail lifts resale value by hundreds. Showroom shine, inside and out, in one visit.','<path d="M3 13l2-5h14l2 5"/><path d="M3 13h18v4H3z"/><circle cx="7" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/>'],
 ['Drafty old windows?','Rising bills and cold rooms. Our energy-rated installs pay for themselves season after season.','<rect x="5" y="4" width="14" height="16" rx="1"/><path d="M12 4v16M5 12h14"/>'],
 ['Overgrown yard?','It only gets harder to tame. One cleanup crew resets it, then we keep it sharp on a schedule.','<path d="M12 20V9"/><path d="M12 12c-3-1-5-4-5-7 3 0 6 2 6 5"/><path d="M12 14c3-1 5-3 5-6-3 0-6 2-6 4"/>']];
const g=document.getElementById('g');
P.forEach(p=>{const c=document.createElement('div');c.className='card frost';
 c.innerHTML=`<div class="ic"><svg viewBox="0 0 24 24">${p[2]}</svg></div><div><h3>${p[0]}</h3><p>${p[1]}</p></div>`;g.appendChild(c);});
const cards=[...g.children];
function run(){cards.forEach(c=>c.classList.remove('in'));cards.forEach((c,i)=>setTimeout(()=>c.classList.add('in'),140+i*130));}
run();setInterval(run,4800);
</script></body></html>
