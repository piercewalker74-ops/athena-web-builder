<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>multi-location-map-cards</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;flex-direction:column;gap:14px}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
 .card{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--glass);position:relative;
   opacity:0;transform:translateY(22px);filter:blur(5px);transition:all .8s cubic-bezier(.2,.8,.2,1)}
 .card.in{opacity:1;transform:none;filter:none}
 .mapbox{height:100px;position:relative;overflow:hidden;background:linear-gradient(140deg,#0c2f45,#0a2236)}
 .mapbox svg{position:absolute;inset:0;width:100%;height:100%}
 .grid-l line{stroke:var(--line);stroke-width:.5}
 .pulse{fill:none;stroke:var(--cyan);transform-origin:center;animation:pl 2.4s ease-out infinite}
 @keyframes pl{0%{r:3px;opacity:.9}100%{r:22px;opacity:0}}
 .core{fill:var(--cyan)}
 .badge{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:8px;letter-spacing:.12em;
   color:#04121e;background:linear-gradient(120deg,var(--cyan),var(--ice));padding:2px 8px;border-radius:6px}
 .body{padding:11px 12px 13px}
 .body h2{font-size:14px}
 .addr{font-size:11px;color:var(--ice);opacity:.75;margin:3px 0 7px;line-height:1.4}
 .hours{font-family:var(--mono);font-size:9px;color:var(--ice);opacity:.7;display:flex;justify-content:space-between}
 .hours.late{color:var(--cyan);opacity:1}
 .links{display:flex;gap:8px;margin-top:9px}
 .mini{font-family:var(--mono);font-size:10px;color:var(--cyan);border:1px solid var(--line2);border-radius:999px;padding:4px 10px}
 @media(max-width:520px){.grid{grid-template-columns:1fr}}
</style></head>
<body class="demo"><div class="demo-name">f · multi-location-map-cards</div>
<div class="stage">
  <div class="eyebrow">FIND US</div>
  <h1 class="big glow" style="font-size:clamp(20px,4vw,30px)">Four showrooms.</h1>
  <div class="grid" id="g"></div>
</div>
<script>
const L=[
 ['Riverside','3820 Mission Inn Ave','9–6','11–2 late',[130,55],true],
 ['Corona','512 Grand Blvd','9–6','—',[80,40],false],
 ['Ontario','77 Euclid Way','10–7','11–2 late',[190,70],false],
 ['Fontana','9004 Sierra Ave','9–5','—',[110,80],false]];
const g=document.getElementById('g');
g.innerHTML=L.map(l=>`<div class="card">
 <div class="mapbox">
   <svg viewBox="0 0 260 100"><g class="grid-l">
     ${Array.from({length:9},(_,i)=>`<line x1="${i*32}" y1="0" x2="${i*32}" y2="100"/>`).join('')}
     ${Array.from({length:4},(_,i)=>`<line x1="0" y1="${i*32}" x2="260" y2="${i*32}"/>`).join('')}
   </g><path d="M10,70 Q90,30 150,55 T250,40" fill="none" stroke="var(--line2)" stroke-dasharray="4 5"/>
   <circle class="pulse" cx="${l[4][0]}" cy="${l[4][1]}"/><circle class="core" cx="${l[4][0]}" cy="${l[4][1]}" r="3.5"/></svg>
   ${l[5]?'<span class="badge">MAIN</span>':''}
 </div>
 <div class="body"><h2 class="glow">${l[0]}</h2><div class="addr">${l[1]}</div>
   <div class="hours"><span>Mon–Sat</span><span>${l[2]}</span></div>
   <div class="hours ${l[3]!=='—'?'late':''}"><span>Fri late</span><span>${l[3]}</span></div>
   <div class="links"><span class="mini">📞 Call</span><span class="mini">↗ Directions</span></div>
 </div></div>`).join('');
const cards=[...g.children];
function run(){cards.forEach(c=>c.classList.remove('in'));cards.forEach((c,i)=>setTimeout(()=>c.classList.add('in'),200+i*160));}
run();setInterval(run,5000);
</script></body></html>
