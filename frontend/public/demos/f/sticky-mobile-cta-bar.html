<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>sticky-mobile-cta-bar</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;justify-content:center}
 .phone{position:relative;width:216px;height:400px;border-radius:32px;border:8px solid #0a2436;overflow:hidden;
   background:linear-gradient(160deg,#061726,#03101c);box-shadow:0 20px 50px rgba(0,0,0,.5),var(--glow)}
 .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:74px;height:16px;background:#0a2436;border-radius:0 0 12px 12px;z-index:4}
 .scr{position:absolute;inset:0;overflow:hidden}
 .feed{position:absolute;left:0;right:0;top:0;padding:26px 12px 70px;display:flex;flex-direction:column;gap:12px;will-change:transform}
 .hero{height:150px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;position:relative}
 .hero h1{font-size:17px}.hero .eyebrow{margin-bottom:4px}
 .block{height:74px;border-radius:10px;background:var(--glass);border:1px solid var(--line)}
 .line{height:9px;border-radius:5px;background:linear-gradient(90deg,var(--ice),transparent);opacity:.5}
 .bar{position:absolute;left:0;right:0;bottom:0;display:flex;gap:8px;padding:10px 12px;z-index:5;
   background:linear-gradient(transparent,rgba(4,18,30,.92) 30%);transform:translateY(120%);transition:transform .45s cubic-bezier(.2,.9,.2,1)}
 .bar.show{transform:none}
 .bar .btn{flex:1;justify-content:center;padding:11px;font-size:13px}
 .bar .btn.ghost{flex:0 0 auto;padding:11px 15px}
 .hint{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:8px;letter-spacing:.14em;
   color:var(--ice);opacity:.5}
</style></head>
<body class="demo"><div class="demo-name">f · sticky-mobile-cta-bar</div>
<div class="stage">
  <div class="phone">
    <div class="notch"></div>
    <div class="scr">
      <div class="feed" id="feed">
        <div class="hero filler eel"><span class="tag">HERO</span><div class="eyebrow">GREENVIEW TURF</div><h1 class="glow">Lawns that stay green.</h1></div>
        <div class="line" style="width:80%"></div><div class="line" style="width:60%"></div>
        <div class="block"></div><div class="block"></div><div class="block"></div><div class="block"></div>
      </div>
      <div class="hint" id="hint">scrolls past hero →</div>
      <div class="bar" id="bar">
        <a class="btn" href="#">📞 Call now</a>
        <a class="btn ghost" href="#">Book</a>
      </div>
    </div>
  </div>
</div>
<script>
const feed=document.getElementById('feed'),bar=document.getElementById('bar'),hint=document.getElementById('hint');
let y=0,dir=1;
function tick(){y+=dir*0.7;if(y>150){dir=-1;}if(y<0){dir=1;y=0;}
 feed.style.transform=`translateY(${-y}px)`;
 // reveal bar once hero (150px) has scrolled out of view
 const past=y>120;bar.classList.toggle('show',past);hint.style.opacity=past?0:.5;
 requestAnimationFrame(tick);}
tick();
</script></body></html>
