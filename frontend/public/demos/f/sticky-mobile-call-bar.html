<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>sticky-mobile-call-bar</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;justify-content:center}
 .phone{width:230px;height:400px;border-radius:30px;border:1px solid var(--line2);background:var(--deep2);position:relative;overflow:hidden;box-shadow:var(--glow)}
 .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:70px;height:6px;border-radius:6px;background:rgba(120,220,255,.25);z-index:5}
 .scroll{position:absolute;inset:0;padding:26px 14px 70px;display:flex;flex-direction:column;gap:12px}
 .filler{width:100%;height:120px}
 .h{height:16px;width:75%;border-radius:5px;background:linear-gradient(90deg,var(--ice),transparent)}
 .l{height:9px;border-radius:5px;background:rgba(143,230,255,.18)}
 .bar{position:absolute;left:0;right:0;bottom:0;padding:11px 12px;display:flex;gap:8px;align-items:center;
   background:rgba(4,18,30,.85);backdrop-filter:blur(8px);border-top:1px solid var(--line2);
   transform:translateY(120%);transition:transform .6s cubic-bezier(.2,.9,.2,1)}
 .bar.in{transform:none}
 .call{flex:1;justify-content:center;padding:12px;animation:pulse 2.2s ease-in-out infinite}
 @keyframes pulse{0%,100%{box-shadow:0 6px 22px rgba(47,224,255,.4)}50%{box-shadow:0 6px 30px rgba(47,224,255,.75)}}
 .txt{position:absolute;left:12px;top:12px;z-index:6}
</style></head>
<body class="demo"><div class="demo-name">f · sticky-mobile-call-bar</div>
<div class="stage">
  <div class="phone">
    <div class="notch"></div>
    <div class="txt eyebrow">ALWAYS IN REACH</div>
    <div class="scroll" id="sc">
      <div style="height:22px"></div>
      <div class="h"></div>
      <div class="filler"><span class="tag">HERO</span></div>
      <div class="l" style="width:90%"></div><div class="l" style="width:70%"></div>
      <div class="filler" style="height:80px"><span class="tag">IMG</span></div>
      <div class="l" style="width:85%"></div><div class="l" style="width:55%"></div>
      <div class="filler" style="height:80px"><span class="tag">MAP</span></div>
    </div>
    <div class="bar" id="bar">
      <button class="btn call">📞 Call (555) 240-7788</button>
      <button class="btn ghost" style="padding:11px 14px">Book</button>
    </div>
  </div>
</div>
<script>
const sc=document.getElementById('sc'),bar=document.getElementById('bar');
let t=0;
function loop(){t+=1;const y=(Math.sin(t*0.012)*0.5+0.5)*160;sc.scrollTop=y;
 bar.classList.toggle('in',y>50);requestAnimationFrame(loop);}
loop();
</script></body></html>
