<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>scroll-aware-nav</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;justify-content:center}
 .win{position:relative;width:100%;max-width:420px;height:340px;border-radius:16px;overflow:hidden;border:1px solid var(--line)}
 .nav{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;justify-content:space-between;
   padding:12px 16px;transition:all .4s;background:transparent}
 .nav.solid{background:rgba(6,23,38,.92);backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,.4);border-bottom:1px solid var(--line)}
 .brand{font-weight:750;font-size:15px;letter-spacing:-.01em}
 .links{display:flex;gap:14px;font-size:12px;color:var(--ice2)}
 @media(max-width:400px){.links{display:none}}
 .burger{width:24px;height:16px;position:relative;cursor:pointer}
 .burger span{position:absolute;left:0;right:0;height:2px;background:var(--frost);border-radius:2px;transition:all .35s}
 .burger span:nth-child(1){top:0}.burger span:nth-child(2){top:7px}.burger span:nth-child(3){top:14px}
 .burger.x span:nth-child(1){top:7px;transform:rotate(45deg)}
 .burger.x span:nth-child(2){opacity:0}
 .burger.x span:nth-child(3){top:7px;transform:rotate(-45deg)}
 .scr{position:absolute;inset:0;overflow:hidden}
 .feed{position:absolute;left:0;right:0;top:0;will-change:transform}
 .hero{height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:6px}
 .hero h1{font-size:24px}
 .sec{padding:16px;display:flex;flex-direction:column;gap:10px}
 .block{height:66px;border-radius:10px;background:var(--glass);border:1px solid var(--line)}
 .drawer{position:absolute;top:0;right:0;bottom:0;width:62%;z-index:7;background:rgba(6,23,38,.97);backdrop-filter:blur(10px);
   border-left:1px solid var(--line);transform:translateX(100%);transition:transform .4s cubic-bezier(.2,.9,.2,1);
   padding:52px 18px;display:flex;flex-direction:column;gap:16px}
 .drawer.open{transform:none}
 .drawer a{font-size:15px;color:var(--frost)}
</style></head>
<body class="demo"><div class="demo-name">f · scroll-aware-nav</div>
<div class="stage">
  <div class="win frost">
    <nav class="nav" id="nav">
      <div class="brand glow">Greenview</div>
      <div class="links"><span>Services</span><span>Gallery</span><span>Contact</span></div>
      <div class="burger" id="burger"><span></span><span></span><span></span></div>
    </nav>
    <div class="drawer" id="drawer"><a>Services</a><a>Gallery</a><a>Reviews</a><a>Contact</a></div>
    <div class="scr">
      <div class="feed" id="feed">
        <div class="hero filler eel"><span class="tag">HERO</span><div class="eyebrow">TRANSPARENT OVER HERO</div><h1 class="glow">Fresh turf, done right.</h1></div>
        <div class="sec"><div class="block"></div><div class="block"></div><div class="block"></div><div class="block"></div></div>
      </div>
    </div>
  </div>
</div>
<script>
const nav=document.getElementById('nav'),feed=document.getElementById('feed'),
 burger=document.getElementById('burger'),drawer=document.getElementById('drawer');
let y=0,dir=1;
function tick(){y+=dir*0.8;if(y>170)dir=-1;if(y<0){dir=1;y=0;}
 feed.style.transform=`translateY(${-y}px)`;
 nav.classList.toggle('solid',y>90);requestAnimationFrame(tick);}
tick();
let open=false;
function toggle(){open=!open;burger.classList.toggle('x',open);drawer.classList.toggle('open',open);}
burger.onclick=toggle;
// auto-demo the drawer periodically
setInterval(()=>{toggle();setTimeout(toggle,1400);},6000);
</script></body></html>
