<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>split-story-with-badge</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:grid;grid-template-columns:1.05fr 1fr;gap:20px;align-items:center}
 @media(max-width:520px){.stage{grid-template-columns:1fr}}
 .copy{display:flex;flex-direction:column;gap:12px}
 .rv{opacity:0;transform:translateY(20px);filter:blur(5px);transition:all .8s cubic-bezier(.2,.8,.2,1)}
 .rv.in{opacity:1;transform:none;filter:none}
 .copy .big{font-size:clamp(22px,4.4vw,34px)}
 .frame{position:relative}
 .frame .filler{height:270px;border-radius:14px}
 .badge{position:absolute;left:-14px;bottom:18px;padding:12px 16px;border-radius:12px;
   background:rgba(6,23,38,.55);backdrop-filter:blur(9px);border:1px solid var(--line2);box-shadow:var(--glow)}
 .badge b{font-size:22px;font-weight:750;letter-spacing:-.02em;display:block;line-height:1}
 .badge span{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--ice);text-transform:uppercase}
</style></head>
<body class="demo"><div class="demo-name">f · split-story-with-badge</div>
<div class="stage">
  <div class="copy">
    <div class="eyebrow rv" data-d="0">OUR STORY</div>
    <h1 class="big glow rv" data-d="1">Two brothers,<br>one small kiln</h1>
    <div class="sub rv" data-d="2">We started firing mugs in a garage in 2009. Every piece is still thrown, glazed and signed by hand — no two the same.</div>
    <a class="chip rv" data-d="3" href="#" onclick="return false">Meet the makers →</a>
  </div>
  <div class="frame rv" data-d="2">
    <div class="filler eel"><span class="tag">STUDIO</span></div>
    <div class="badge"><b>1,200+</b><span>pieces a year</span></div>
  </div>
</div>
<script>
const els=[...document.querySelectorAll('.rv')];
function run(){els.forEach(e=>e.classList.remove('in'));els.forEach(e=>setTimeout(()=>e.classList.add('in'),180+(+e.dataset.d)*200));}
run();setInterval(run,4800);
</script></body></html>
