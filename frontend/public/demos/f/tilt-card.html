<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>tilt-card</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;align-items:center;justify-content:center;perspective:900px}
 .card{width:300px;border-radius:20px;padding:18px;position:relative;transform-style:preserve-3d;
   transition:transform .14s ease-out;will-change:transform}
 .card .filler{height:158px;margin-bottom:14px;transform:translateZ(46px)}
 .card .row{display:flex;justify-content:space-between;align-items:center;transform:translateZ(34px)}
 .card h2{font-size:19px}
 .card .price{font-family:var(--mono);font-size:13px;color:var(--cyan)}
 .card p{font-size:12px;color:var(--ice);opacity:.72;margin-top:5px;transform:translateZ(22px)}
 .card .chip{margin-top:12px;transform:translateZ(30px)}
 .glare{position:absolute;inset:0;border-radius:20px;pointer-events:none;
   background:radial-gradient(240px 240px at var(--mx,50%) var(--my,50%),rgba(255,255,255,.28),transparent 46%)}
 .hint{position:fixed;bottom:14px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9px;color:var(--ice);opacity:.5;letter-spacing:.16em}
</style></head>
<body class="demo"><div class="demo-name">f · tilt-card</div>
<div class="stage"><div class="card frost" id="card">
  <div class="filler eel"><span class="tag">SUBJECT</span></div>
  <div class="row"><h2>Emerald 45</h2><span class="price">$4.29/ft²</span></div>
  <p>Dual-tone monofilament blades · 45mm pile · UV-locked</p>
  <span class="chip">◇ tilt for glare</span>
  <div class="glare" id="glare"></div>
</div></div>
<div class="hint">hover the card — it tilts toward your pointer with a tracking glare</div>
<script>
const c=document.getElementById('card'),gl=document.getElementById('glare');
const MAX=14;let raf;
c.addEventListener('pointermove',e=>{const r=c.getBoundingClientRect();
 const px=(e.clientX-r.left)/r.width,py=(e.clientY-r.top)/r.height;
 c.style.transform=`rotateY(${(px-.5)*MAX*2}deg) rotateX(${-(py-.5)*MAX*2}deg)`;
 gl.style.setProperty('--mx',px*100+'%');gl.style.setProperty('--my',py*100+'%');});
c.addEventListener('pointerleave',()=>{c.style.transform='';gl.style.setProperty('--mx','50%');gl.style.setProperty('--my','-30%');});
// gentle auto demo when untouched
let t=0,hov=false;c.addEventListener('pointerenter',()=>hov=true);c.addEventListener('pointerleave',()=>hov=false);
function idle(){if(!hov){t+=.02;const px=.5+Math.cos(t)*.32,py=.5+Math.sin(t*1.3)*.28;
 c.style.transform=`rotateY(${(px-.5)*MAX*2}deg) rotateX(${-(py-.5)*MAX*2}deg)`;
 gl.style.setProperty('--mx',px*100+'%');gl.style.setProperty('--my',py*100+'%');}
 requestAnimationFrame(idle);}idle();
</script></body></html>
