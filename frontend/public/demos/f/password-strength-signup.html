<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>password-strength-signup</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;flex-direction:column;gap:14px;max-width:400px;margin:0 auto}
 label{font-size:11px;font-family:var(--mono);letter-spacing:.1em;color:var(--ice);text-transform:uppercase;display:block;margin-bottom:6px}
 input{width:100%;background:var(--glass);border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--frost);font-size:14px;font-family:var(--sans);outline:none;transition:border .2s}
 input:focus{border-color:var(--line2)}
 .field{position:relative}
 .field .msg{font-size:10px;font-family:var(--mono);margin-top:5px;height:12px;color:#ff7a92}
 .field.ok input{border-color:rgba(91,255,157,.5)}.field.ok .msg{color:#5bff9d}
 .bar{height:8px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:8px}
 .fill{height:100%;width:0;border-radius:999px;transition:width .4s,background .4s}
 .plabel{display:flex;justify-content:space-between;font-size:11px;margin-top:7px;font-family:var(--mono)}
 .plabel b{transition:color .3s}
 .reqs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
 .req{font-family:var(--mono);font-size:9px;letter-spacing:.06em;padding:3px 8px;border-radius:5px;border:1px solid var(--line);color:var(--ice);opacity:.55;transition:all .3s}
 .req.hit{opacity:1;color:#5bff9d;border-color:rgba(91,255,157,.5)}
 .done{text-align:center;padding:20px 0}.done .ck{width:52px;height:52px;border-radius:50%;background:var(--cyan);color:#04121e;font-size:26px;display:grid;place-items:center;margin:0 auto 12px;box-shadow:var(--glow)}
</style></head>
<body class="demo"><div class="demo-name">f · password-strength-signup</div>
<div class="stage frost" style="padding:22px" id="stage">
  <div><div class="eyebrow">CREATE YOUR ACCOUNT</div><h1 class="big glow" style="font-size:22px;margin-top:6px">Get started</h1></div>
  <div class="field" id="fEmail"><label>Email</label><input id="email" type="email" placeholder="you@domain.com"><div class="msg"></div></div>
  <div class="field" id="fPass"><label>Password</label><input id="pass" type="password" placeholder="Create a password">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="plabel"><span>Strength</span><b id="plab">—</b></div>
    <div class="reqs"><span class="req" data-r="len">8+ chars</span><span class="req" data-r="num">number</span><span class="req" data-r="sym">symbol</span><span class="req" data-r="case">upper &amp; lower</span></div>
  </div>
  <button class="btn" id="go" style="justify-content:center">Create account</button>
</div>
<script>
const email=document.getElementById('email'),pass=document.getElementById('pass'),fill=document.getElementById('fill'),plab=document.getElementById('plab'),go=document.getElementById('go'),stage=document.getElementById('stage');
const COL=['#ff5b7a','#ff8f5b','#ffcf5b','#8fe6ff','#5bff9d'],WORD=['Too weak','Weak','Fair','Good','Strong'];
function checks(v){return{len:v.length>=8,num:/[0-9]/.test(v),sym:/[^A-Za-z0-9]/.test(v),case:/[a-z]/.test(v)&&/[A-Z]/.test(v)};}
function score(){const c=checks(pass.value);const hit=Object.values(c).filter(Boolean).length;
 document.querySelectorAll('.req').forEach(r=>r.classList.toggle('hit',c[r.dataset.r]));
 const s=pass.value?hit:0;fill.style.width=(s/4*100)+'%';fill.style.background=COL[s];plab.textContent=WORD[s];plab.style.color=COL[s];return s;}
pass.addEventListener('input',score);
document.getElementById('fEmail').querySelector('input').addEventListener('blur',e=>{const f=document.getElementById('fEmail');const ok=/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e.target.value);
 f.classList.toggle('ok',ok&&!!e.target.value);f.querySelector('.msg').textContent=e.target.value&&!ok?'Enter a valid email':ok?'Looks good ✓':'';});
go.onclick=()=>{if(score()<3){pass.focus();return;}stage.innerHTML='<div class="done"><div class="ck">✓</div><h1 class="big glow" style="font-size:22px">Account created</h1><p class="sub" style="margin-top:8px">Check your inbox to verify.</p></div>';};
// idle demo: type a strengthening password once
const demo='Turf2024!';let i=0;const iv=setInterval(()=>{if(document.activeElement===pass){clearInterval(iv);return;}
 pass.value=demo.slice(0,i);score();i++;if(i>demo.length){i=0;pass.value='';score();}},280);
</script></body></html>
