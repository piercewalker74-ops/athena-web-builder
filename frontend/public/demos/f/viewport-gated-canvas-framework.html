<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>viewport-gated-canvas-framework</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{width:100%;max-width:520px;display:flex;flex-direction:column;gap:12px}
 .row{display:flex;gap:12px}
 .card{flex:1;position:relative;height:120px;border-radius:14px;overflow:hidden}
 canvas{position:absolute;inset:0;width:100%;height:100%}
 .lbl{position:absolute;left:10px;top:8px;font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--ice);z-index:1}
 .gate{position:absolute;right:8px;bottom:6px;font-family:var(--mono);font-size:8px;color:var(--teal);z-index:1}
 .gate.off{color:var(--ice);opacity:.4}
 .cap{text-align:center}
</style></head>
<body class="demo"><div class="demo-name">f · viewport-gated-canvas-framework</div>
<div class="stage">
  <div class="cap"><div class="eyebrow">data-anim registry · runs only on-screen</div></div>
  <div class="row">
    <div class="card frost"><span class="lbl">draw: waves</span><canvas data-anim="waves"></canvas><span class="gate" id="g0">● live</span></div>
    <div class="card frost"><span class="lbl">draw: rings</span><canvas data-anim="rings"></canvas><span class="gate" id="g1">● live</span></div>
  </div>
  <div class="row">
    <div class="card frost"><span class="lbl">draw: grid</span><canvas data-anim="grid"></canvas><span class="gate" id="g2">● live</span></div>
    <div class="card frost"><span class="lbl">draw: comet</span><canvas data-anim="comet"></canvas><span class="gate" id="g3">● live</span></div>
  </div>
</div>
<script>
const DRAW={
 waves:(c,w,h,t)=>{c.strokeStyle='rgba(47,224,255,.8)';for(let y=0;y<3;y++){c.beginPath();for(let x=0;x<w;x+=4){c.lineTo(x,h/2+Math.sin(x*.05+t+y)*12*(y+1));}c.globalAlpha=.4+y*.2;c.stroke();}c.globalAlpha=1;},
 rings:(c,w,h,t)=>{for(let i=0;i<4;i++){const r=((t*30+i*30)%80);c.strokeStyle=`rgba(143,230,255,${1-r/80})`;c.beginPath();c.arc(w/2,h/2,r,0,7);c.stroke();}},
 grid:(c,w,h,t)=>{for(let x=8;x<w;x+=16)for(let y=8;y<h;y+=16){const s=1.5+Math.sin(x*.1+y*.1+t)*1.2;c.fillStyle='rgba(57,211,201,.7)';c.fillRect(x,y,s,s);}},
 comet:(c,w,h,t)=>{const x=(t*60)%w;c.fillStyle='rgba(47,224,255,.9)';c.beginPath();c.arc(x,h/2+Math.sin(t)*20,3,0,7);c.fill();c.strokeStyle='rgba(47,224,255,.3)';c.beginPath();c.moveTo(x,h/2+Math.sin(t)*20);c.lineTo(x-30,h/2+Math.sin(t-.5)*20);c.stroke();},
};
const dpr=Math.min(devicePixelRatio||1,2);
document.querySelectorAll('canvas[data-anim]').forEach(cv=>{const ctx=cv.getContext('2d');const fn=DRAW[cv.dataset.anim];
 function size(){cv.width=cv.clientWidth*dpr;cv.height=cv.clientHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}size();cv._fn=fn;cv._ctx=ctx;});
const cvs=[...document.querySelectorAll('canvas[data-anim]')];let t=0;
function loop(){t+=0.02;cvs.forEach(cv=>{cv._ctx.clearRect(0,0,cv.clientWidth,cv.clientHeight);cv._fn(cv._ctx,cv.clientWidth,cv.clientHeight,t);});requestAnimationFrame(loop);}loop();
// simulate the intersection gate toggling one card off/on
let k=0;setInterval(()=>{const g=document.getElementById('g'+(k%4));document.querySelectorAll('.gate').forEach(x=>x.classList.remove('off'));g.classList.add('off');g.textContent='○ paused (off-screen)';document.querySelectorAll('.gate:not(.off)').forEach(x=>x.textContent='● live');k++;},1600);
</script></body></html>
