<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ambient-glow-orbs</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{height:340px;border-radius:20px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
   background:linear-gradient(160deg,#061726,#03101c 75%);border:1px solid var(--line)}
 .orb{position:absolute;border-radius:50%;filter:blur(46px);opacity:.55;mix-blend-mode:screen}
 .o1{width:340px;height:340px;left:-120px;top:-120px;background:radial-gradient(circle,var(--cyan),transparent 68%);animation:d1 11s ease-in-out infinite alternate}
 .o2{width:300px;height:300px;right:-110px;bottom:-120px;background:radial-gradient(circle,var(--teal),transparent 68%);animation:d2 13s ease-in-out infinite alternate}
 .o3{width:220px;height:220px;right:-80px;top:-70px;background:radial-gradient(circle,#1b6fb0,transparent 66%);animation:d3 9s ease-in-out infinite alternate}
 @keyframes d1{to{transform:translate(50px,40px) scale(1.15)}}
 @keyframes d2{to{transform:translate(-40px,-30px) scale(1.2)}}
 @keyframes d3{to{transform:translate(-30px,40px) scale(1.1)}}
 .cap{position:relative;text-align:center;padding:0 24px}
 .cap .big{font-size:clamp(24px,5vw,40px)}
</style></head>
<body class="demo"><div class="demo-name">f · ambient-glow-orbs</div>
<div class="stage">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="cap"><div class="eyebrow">AMBIENT DEPTH LAYER</div><h1 class="big glow">Warmth on a flat<br>dark canvas</h1>
    <div class="sub" style="margin-top:10px">Off-canvas radial blobs bled into the corners add color temperature without a single image.</div></div>
</div>
</body></html>
