<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>cinematic-composite-depth</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{height:340px;perspective:800px;overflow:hidden;border-radius:18px}
 .scene{position:absolute;inset:0}
 .lyr{position:absolute;inset:0;transition:transform .2s ease-out}
 .far .filler{width:100%;height:100%;border-radius:0;filter:blur(2px) brightness(.7)}
 .mid{display:flex;align-items:center;justify-content:center}
 .core{width:180px;height:180px;border-radius:50%;position:relative;
   background:radial-gradient(circle at 42% 38%,rgba(47,224,255,.5),rgba(57,211,201,.15) 55%,transparent 70%);filter:blur(2px)}
 .core:after{content:'';position:absolute;inset:22%;border-radius:50%;border:1px solid var(--line2);box-shadow:var(--glow)}
 .bokeh{position:absolute;border-radius:50%;mix-blend-mode:screen;filter:blur(4px)}
 .cap{position:absolute;left:22px;bottom:20px}
 .cap .big{font-size:clamp(22px,4.4vw,38px)}
 .band{position:absolute;left:0;right:0;bottom:0;top:0;pointer-events:none;
   background:radial-gradient(120% 90% at 50% 40%,transparent 40%,rgba(4,18,30,.6))}
 .tags{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
</style></head>
<body class="demo"><div class="demo-name">f · cinematic-composite-depth</div>
<div class="stage frost" id="st">
 <div class="scene">
  <div class="lyr far" data-d="6"><div class="filler eel"><span class="tag">FAR</span></div></div>
  <div class="lyr mid" data-d="22"><div class="core"></div></div>
  <div class="lyr near" data-d="52" id="near"></div>
 </div>
 <div class="band"></div>
 <div class="tags"><span class="chip">◇ far</span><span class="chip">◇ mid 3D</span><span class="chip">◇ near bokeh</span></div>
 <div class="cap"><div class="eyebrow">THREE-BAND DEPTH</div><h1 class="big glow">Layers that<br>breathe apart.</h1></div>
</div>
<script>
const st=document.getElementById('st'),lyr=[...document.querySelectorAll('.lyr')],near=document.getElementById('near');
// scatter near-layer bokeh discs
for(let i=0;i<7;i++){const b=document.createElement('div');b.className='bokeh';const s=18+Math.random()*40;
 b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*90}%;top:${Math.random()*80}%;background:radial-gradient(circle,rgba(180,236,255,.5),transparent 70%)`;near.appendChild(b);}
let tx=0,ty=0,cx=0,cy=0,a=0;
st.addEventListener('mousemove',e=>{const r=st.getBoundingClientRect();tx=(e.clientX-r.left)/r.width-.5;ty=(e.clientY-r.top)/r.height-.5;});
st.addEventListener('mouseleave',()=>{tx=0;ty=0;});
function loop(){a+=0.01;const ix=tx||Math.sin(a)*.35,iy=ty||Math.cos(a*.7)*.25;
 cx+=(ix-cx)*.06;cy+=(iy-cy)*.06;
 lyr.forEach(l=>{const d=+l.dataset.d;l.style.transform=`translate(${-cx*d}px,${-cy*d}px) scale(1.06)`;});
 requestAnimationFrame(loop);}
loop();
</script></body></html>
