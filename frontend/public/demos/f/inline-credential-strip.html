<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>inline-credential-strip</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;flex-direction:column;gap:0}
 .hero{padding:26px 24px 30px;text-align:center;border-radius:16px 16px 0 0}
 .hero .big{font-size:clamp(22px,4.4vw,34px)}
 .strip{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;
   border-radius:0 0 16px 16px;border-top:none;padding:14px 16px;gap:0}
 .cred{display:flex;align-items:center;gap:8px;padding:4px 18px;position:relative;
   opacity:0;transform:translateY(8px);transition:all .5s cubic-bezier(.3,1.2,.5,1)}
 .cred.in{opacity:1;transform:none}
 .cred+.cred:before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
   width:1px;height:22px;background:var(--line2)}
 .cred .ic{font-size:15px;color:var(--cyan);filter:drop-shadow(0 0 6px rgba(47,224,255,.5))}
 .cred .v{font-weight:700;font-size:14px}
 .cred .l{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--ice);opacity:.7;text-transform:uppercase}
 .stars{color:var(--cyan);letter-spacing:1px}
</style></head>
<body class="demo"><div class="demo-name">f · inline-credential-strip</div>
<div class="stage">
  <div class="hero frost">
    <div class="eyebrow">GLACIER TURF CO.</div>
    <h1 class="big glow" style="margin-top:8px">Premium synthetic lawns,<br>installed to last.</h1>
  </div>
  <div class="strip frost" id="strip">
    <div class="cred"><span class="ic">★</span><span class="v"><span class="stars">4.9</span> Rating</span><span class="l">312 reviews</span></div>
    <div class="cred"><span class="ic">◈</span><span class="v">Licensed &amp; Insured</span><span class="l">CA #874-201</span></div>
    <div class="cred"><span class="ic">◇</span><span class="v">15-Yr Warranty</span><span class="l">UV-stable pile</span></div>
    <div class="cred"><span class="ic">⌂</span><span class="v">Bay Area</span><span class="l">since 2009</span></div>
  </div>
</div>
<script>
const c=[...document.querySelectorAll('.cred')];
function run(){c.forEach(x=>x.classList.remove('in'));c.forEach((x,i)=>setTimeout(()=>x.classList.add('in'),240+i*130));}
run();setInterval(run,4600);
</script></body></html>
