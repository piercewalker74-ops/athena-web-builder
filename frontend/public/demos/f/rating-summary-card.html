<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>rating-summary-card</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;justify-content:center}
 .card{width:100%;max-width:360px;padding:30px 26px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
 .score{font-size:clamp(56px,15vw,96px);font-weight:700;line-height:.9;letter-spacing:-.03em}
 .of{font-size:16px;color:var(--ice);opacity:.55;font-family:var(--mono)}
 .stars{display:flex;gap:6px}
 .star{width:26px;height:26px;color:#183042;transition:color .3s}
 .star.on{color:var(--cyan);filter:drop-shadow(0 0 8px rgba(47,224,255,.6))}
 .count{font-size:13px;color:var(--ice);opacity:.75}
 .count b{color:var(--frost)}
</style></head>
<body class="demo"><div class="demo-name">f · rating-summary-card</div>
<div class="stage">
  <div class="card frost">
    <div class="eyebrow">WHAT CLIENTS SAY</div>
    <div class="score glow"><span id="sc">0.0</span> <span class="of">/ 5</span></div>
    <div class="stars" id="st">
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>
    </div>
    <div class="count">Based on <b id="cn">0</b> verified reviews</div>
  </div>
</div>
<script>
const sc=document.getElementById('sc'),cn=document.getElementById('cn'),stars=[...document.querySelectorAll('.star')];
const TARGET=4.8,COUNT=973;
function ease(t){return 1-Math.pow(1-t,3);}
function run(){stars.forEach(s=>s.classList.remove('on'));const dur=1700,s0=performance.now();
 (function step(now){const p=Math.min(1,(now-s0)/dur),e=ease(p);
  sc.textContent=(e*TARGET).toFixed(1);cn.textContent=Math.round(e*COUNT).toLocaleString();
  const lit=Math.round(e*5);stars.forEach((st,i)=>st.classList.toggle('on',i<lit));
  if(p<1)requestAnimationFrame(step);})(s0);}
run();setInterval(run,4200);
</script></body></html>
