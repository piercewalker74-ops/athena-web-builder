<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>hover.shine_sweep</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;flex-direction:column;gap:16px;align-items:center}
 .eyebrow{align-self:flex-start}
 .card{position:relative;width:100%;max-width:320px;border-radius:16px;overflow:hidden;padding:18px}
 .card .filler{height:150px;border-radius:12px;margin-bottom:12px}
 .card h2{font-size:19px}.card p{font-size:12px;color:var(--ice);opacity:.75;margin-top:3px}
 .price{position:absolute;top:16px;right:16px;font-family:var(--mono);font-size:12px;color:var(--cyan);
   border:1px solid var(--line2);border-radius:999px;padding:4px 11px;background:rgba(4,18,30,.6)}
 .shine{position:absolute;inset:-40% -20%;pointer-events:none;
   background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.38) 48%,rgba(180,236,255,.55) 50%,transparent 60%);
   transform:translateX(-120%);}
 .card.sweep .shine{animation:sweep 1.1s cubic-bezier(.5,0,.2,1)}
 @keyframes sweep{from{transform:translateX(-120%)}to{transform:translateX(120%)}}
 .card:hover .shine{animation:sweep 1s cubic-bezier(.5,0,.2,1)}
 .hint{font-family:var(--mono);font-size:9px;color:var(--ice);opacity:.55;letter-spacing:.14em}
</style></head>
<body class="demo"><div class="demo-name">f · hover.shine_sweep</div>
<div class="stage">
  <div class="eyebrow">PREMIUM GLOSS SWEEP</div>
  <div class="card frost" id="card">
    <span class="price">$249</span>
    <div class="filler eel"><span class="tag">PRODUCT</span></div>
    <h2 class="glow">Frostline Editon</h2>
    <p>A skewed highlight glides across the face — that showroom-glass finish, in one moving line.</p>
    <div class="shine"></div>
  </div>
  <div class="hint">auto-sweeps · hover the card to catch the light</div>
</div>
<script>
const card=document.getElementById('card');
function sweep(){
  if(card.matches(':hover'))return;
  card.classList.remove('sweep');void card.offsetWidth;card.classList.add('sweep');
}
setInterval(sweep,2600);setTimeout(sweep,600);
</script></body></html>
