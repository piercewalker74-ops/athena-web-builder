<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>image-dropzone-request-form</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;gap:14px;flex-wrap:wrap}
 .col{flex:1;min-width:200px;display:flex;flex-direction:column;gap:10px}
 .fld{background:var(--glass);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-family:var(--sans);
   font-size:12px;color:var(--frost)}
 .fld::placeholder{color:rgba(234,246,255,.4)}
 .zone{border:2px dashed var(--line2);border-radius:14px;min-height:120px;display:grid;place-items:center;text-align:center;
   background:var(--glass);transition:all .3s;padding:12px}
 .zone.hot{border-color:var(--cyan);background:rgba(47,224,255,.08);box-shadow:var(--glow)}
 .zone .ic{font-size:30px}.zone p{font-size:11px;color:var(--ice);opacity:.7;margin-top:5px}
 .thumbs{display:flex;gap:7px;flex-wrap:wrap}
 .th{position:relative;width:52px;height:52px;border-radius:8px;overflow:hidden;animation:pop .4s cubic-bezier(.2,1.4,.3,1)}
 .th .filler{position:absolute;inset:0;border-radius:0}.th .filler:after{content:''}
 .th .rm{position:absolute;top:1px;right:1px;width:14px;height:14px;border-radius:50%;background:rgba(4,18,30,.8);color:var(--ice2);
   font-size:9px;display:grid;place-items:center;cursor:pointer}
 @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
 .ghost{position:absolute;width:56px;height:44px;border-radius:7px;pointer-events:none;box-shadow:0 8px 20px rgba(0,0,0,.5);opacity:0}
 .send{margin-top:2px}
 .ok{display:none;padding:14px;border-radius:12px;text-align:center;font-size:13px;color:var(--frost)}
 .ok.show{display:block;animation:pop .5s}
</style></head>
<body class="demo"><div class="demo-name">f · image-dropzone-request-form</div>
<div class="stage">
  <div class="col">
    <div class="eyebrow">PROJECT REQUEST</div>
    <input class="fld" placeholder="Your name" value="Jordan Blake" readonly>
    <input class="fld" placeholder="Email" value="jordan@home.com" readonly>
    <input class="fld" placeholder="Project ZIP" value="60614" readonly>
    <button class="btn send">Send request →</button>
  </div>
  <div class="col">
    <div class="eyebrow">REFERENCE PHOTOS</div>
    <div class="zone" id="z"><div><div class="ic glow">⬓</div><p id="p">Drag reference photos here</p></div></div>
    <div class="thumbs" id="th"></div>
  </div>
</div>
<div class="ghost filler" id="g"><span class="tag">IMG</span></div>
<script>
const z=document.getElementById('z'),g=document.getElementById('g'),p=document.getElementById('p'),th=document.getElementById('th');
let n=0;
function addThumb(){const d=document.createElement('div');d.className='th';n++;
 d.innerHTML=`<div class="filler eel"></div><div class="rm">✕</div>`;
 d.querySelector('.rm').onclick=()=>d.remove();th.appendChild(d);
 p.textContent=n<3?`${n}/3 min — keep going`:'✓ ready to submit';}
function fly(){const zr=z.getBoundingClientRect();const sx=zr.left-90,sy=zr.top-10,ex=zr.left+zr.width/2-28,ey=zr.top+zr.height/2-22;
 let t=0;g.style.opacity=1;
 (function step(){t+=.03;const e=t<1?t:1,k=1-Math.pow(1-e,2);g.style.left=(sx+(ex-sx)*k)+'px';g.style.top=(sy+(ey-sy)*k)+'px';
  z.classList.toggle('hot',e>.55);
  if(e<1)requestAnimationFrame(step);else{g.style.opacity=0;z.classList.remove('hot');addThumb();}})();}
function cycle(){if(th.children.length>=4){th.innerHTML='';n=0;p.textContent='Drag reference photos here';}
 fly();}
cycle();setInterval(cycle,2400);
</script></body></html>
