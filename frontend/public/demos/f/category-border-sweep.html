<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>category-border-sweep</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;flex-direction:column;gap:14px}
 .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
 @media(max-width:520px){.grid{grid-template-columns:repeat(2,1fr)}}
 .cat{position:relative;aspect-ratio:1/1.05;border-radius:14px;overflow:hidden;cursor:pointer}
 .cat svg{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}
 .cat rect{fill:none;stroke:var(--teal);stroke-width:1.5;
   stroke-dasharray:1;stroke-dashoffset:1;pathLength:1;filter:drop-shadow(0 0 4px rgba(57,211,201,.7))}
 .cat.draw rect{transition:stroke-dashoffset 1.1s ease}
 .cat.draw.on rect{stroke-dashoffset:0}
 .cat .filler{position:absolute;inset:5px;border-radius:10px;opacity:0;transition:opacity .7s .5s}
 .cat.on .filler{opacity:1}
 .cat .label{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:18px 12px 10px;
   background:linear-gradient(transparent,rgba(4,18,30,.85));opacity:0;transform:translateY(8px);transition:.6s .7s}
 .cat.on .label{opacity:1;transform:none}
 .cat .label b{font-size:14px}.cat .label span{display:block;font-family:var(--mono);font-size:9px;color:var(--ice);opacity:.7;margin-top:2px}
</style></head>
<body class="demo"><div class="demo-name">f · category-border-sweep</div>
<div class="stage">
  <div class="eyebrow">SHOP BY LANDSCAPE</div>
  <h2 class="big" style="font-size:22px">Pick your turf</h2>
  <div class="grid" id="grid"></div>
</div>
<script>
const CATS=[['Lawns','residential · 40oz+'],['Putting Greens','15mm · true roll'],['Pet Turf','antimicrobial'],
['Playgrounds','IPEMA fall-rated'],['Rooftop','UV-locked'],['Sports','shock pad ready']];
const grid=document.getElementById('grid');
CATS.forEach(([name,sub])=>{
  const c=document.createElement('div');c.className='cat frost draw';
  c.innerHTML=`<svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="2" y="2" width="96" height="96" rx="6"/></svg>
    <div class="filler eel"></div><div class="label"><b>${name}</b><span>${sub}</span></div>`;
  c.addEventListener('mouseenter',()=>{c.classList.remove('on');void c.offsetWidth;c.classList.add('on');});
  grid.appendChild(c);
});
function sweep(){const cards=[...grid.children];cards.forEach(c=>c.classList.remove('on'));
  cards.forEach((c,i)=>setTimeout(()=>c.classList.add('on'),200+i*220));}
sweep();setInterval(sweep,5200);
</script></body></html>
