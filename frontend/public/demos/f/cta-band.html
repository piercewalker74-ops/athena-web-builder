<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>cta-band</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;flex-direction:column;gap:12px}
 .band{position:relative;overflow:hidden;padding:30px 24px;border-radius:18px;text-align:center;
   background:linear-gradient(120deg,#0a3a4c,#0b2942 55%,#103f52)}
 .band:before{content:'';position:absolute;inset:0;opacity:.5;
   background:radial-gradient(60% 120% at 50% -10%,rgba(47,224,255,.35),transparent 60%)}
 .band>*{position:relative}
 .band .eyebrow{opacity:.9}
 .band h1{font-size:clamp(22px,4.6vw,34px);margin:8px 0 4px}
 .band .sub{max-width:360px;margin:0 auto 18px}
 .phone{display:inline-flex;align-items:center;gap:10px;font-size:clamp(20px,4vw,28px);font-weight:750;color:#04121e;
   padding:14px 26px;border-radius:999px;background:linear-gradient(120deg,var(--cyan),var(--ice));
   box-shadow:0 10px 34px rgba(47,224,255,.5);cursor:pointer;text-decoration:none}
 .phone .ic{font-size:.8em}
 .meta{margin-top:14px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ice2);opacity:.8}
 @keyframes ping{0%{transform:scale(1);box-shadow:0 10px 34px rgba(47,224,255,.5)}
   50%{transform:scale(1.04);box-shadow:0 14px 44px rgba(47,224,255,.75)}100%{transform:scale(1);box-shadow:0 10px 34px rgba(47,224,255,.5)}}
 .phone{animation:ping 2.4s ease-in-out infinite}
 .ring{position:absolute;left:50%;top:0;width:10px;height:10px;border-radius:50%}
 .sh{position:absolute;top:0;left:-40%;width:40%;height:100%;transform:skewX(-18deg);
   background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);animation:sweep 4.5s linear infinite}
 @keyframes sweep{0%{left:-40%}60%,100%{left:140%}}
</style></head>
<body class="demo"><div class="demo-name">f · cta-band</div>
<div class="stage">
  <div class="band frost">
    <div class="sh"></div>
    <div class="eyebrow">READY WHEN YOU ARE</div>
    <h1 class="glow">Let's get your yard on the schedule.</h1>
    <p class="sub">Free on-site measure. Most installs booked within a week.</p>
    <a class="phone" href="tel:+13125550142" id="p"><span class="ic">📞</span><span>(312) 555-0142</span></a>
    <div class="meta">MON–SAT · 7AM–7PM · SERVING GREATER CHICAGO</div>
  </div>
</div>
<script>
// subtle live pulse on the number + a periodic "incoming" glow flash
const p=document.getElementById('p');
setInterval(()=>{p.animate([{filter:'brightness(1)'},{filter:'brightness(1.3)'},{filter:'brightness(1)'}],{duration:600});},2400);
</script></body></html>
