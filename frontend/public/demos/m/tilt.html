<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>tilt</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;align-items:center;justify-content:center;perspective:800px}
 .card{width:300px;border-radius:18px;padding:20px;transform-style:preserve-3d;transition:transform .12s ease-out}
 .card .filler{height:150px;margin-bottom:14px;transform:translateZ(40px)}
 .card h2{font-size:20px;transform:translateZ(30px)}
 .card p{font-size:12px;color:var(--ice);opacity:.7;margin-top:4px;transform:translateZ(20px)}
 .shine{position:absolute;inset:0;border-radius:18px;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.22),transparent 45%);pointer-events:none}
 .hint{position:fixed;bottom:14px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9px;color:var(--ice);opacity:.5;letter-spacing:.16em}
</style></head>
<body class="demo"><div class="demo-name">m · tilt</div>
<div class="stage"><div class="card frost" id="card" style="position:relative">
  <div class="filler"><span class="tag">IMG</span></div>
  <h2>3D Tilt Card</h2><p>filler · follows your cursor with parallax depth</p>
  <div class="shine" id="sh"></div>
</div></div>
<div class="hint">hover the card</div>
<script>
const c=document.getElementById('card'),sh=document.getElementById('sh');
c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();const px=(e.clientX-r.left)/r.width,py=(e.clientY-r.top)/r.height;
 c.style.transform=`rotateY(${(px-.5)*18}deg) rotateX(${-(py-.5)*18}deg)`;sh.style.setProperty('--mx',px*100+'%');sh.style.setProperty('--my',py*100+'%');});
c.addEventListener('mouseleave',()=>{c.style.transform='';});
</script></body></html>
