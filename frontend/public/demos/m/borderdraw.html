<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>borderdraw</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;align-items:center;justify-content:center}
 .card{position:relative;width:320px;padding:34px 30px;border-radius:16px;background:var(--glass);backdrop-filter:blur(6px)}
 .card svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
 .card rect{fill:none;stroke:var(--cyan);stroke-width:2;rx:16;
   stroke-dasharray:1000;stroke-dashoffset:1000;animation:draw 3.2s ease-in-out infinite;filter:drop-shadow(0 0 6px rgba(47,224,255,.6))}
 @keyframes draw{0%{stroke-dashoffset:1000}55%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
 .card h2{font-size:20px}.card p{font-size:12px;color:var(--ice);opacity:.7;margin-top:6px}
</style></head>
<body class="demo"><div class="demo-name">m · borderdraw</div>
<div class="stage"><div class="card">
  <svg><rect x="1" y="1" width="318" height="calc(100% - 2px)"/></svg>
  <div class="eyebrow">SELF-DRAWING BORDER</div>
  <h2 class="glow">Outlined on entry</h2>
  <p>A stroke traces the frame as the card comes into view.</p>
</div></div>
</body></html>
