<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>gradient</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{height:320px;border-radius:18px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
 .mesh{position:absolute;inset:-40%;filter:blur(30px);
   background:
     radial-gradient(circle at 30% 30%,#2fe0ff,transparent 40%),
     radial-gradient(circle at 70% 40%,#39d3c9,transparent 42%),
     radial-gradient(circle at 50% 75%,#8fe6ff,transparent 45%),
     radial-gradient(circle at 20% 80%,#1b6fb0,transparent 40%);
   animation:swirl 12s linear infinite}
 @keyframes swirl{to{transform:rotate(360deg) scale(1.1)}}
 .veil{position:absolute;inset:0;background:rgba(4,18,30,.35)}
 .cap{position:relative;text-align:center}
</style></head>
<body class="demo"><div class="demo-name">m · gradient</div>
<div class="stage">
  <div class="mesh"></div><div class="veil"></div>
  <div class="cap"><div class="eyebrow">ANIMATED MESH</div><h1 class="big glow">Living color field</h1></div>
</div>
</body></html>
