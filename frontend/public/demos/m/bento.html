<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>bento</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:80px;gap:12px}
 .b{border-radius:14px;position:relative;overflow:hidden;padding:14px;display:flex;flex-direction:column;justify-content:flex-end;
   transition:transform .25s,box-shadow .25s;opacity:0;transform:translateY(16px)}
 .b.in{opacity:1;transform:none}
 .b:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 10px 30px rgba(47,224,255,.25)}
 .b b{font-size:14px;position:relative}.b .filler{position:absolute;inset:0;border-radius:0;opacity:.5}
 .w2{grid-column:span 2}.h2{grid-row:span 2}.w2h2{grid-column:span 2;grid-row:span 2}
</style></head>
<body class="demo"><div class="demo-name">m · bento</div>
<div class="stage" id="s">
  <div class="b frost w2h2"><div class="filler"><span class="tag">IMG</span></div><b>Feature grid</b></div>
  <div class="b frost w2"><b>Wide tile</b></div>
  <div class="b frost h2"><div class="filler"></div><b>Tall</b></div>
  <div class="b frost"><b>Cell</b></div>
  <div class="b frost"><b>Cell</b></div>
  <div class="b frost w2"><div class="filler"></div><b>Photo</b></div>
</div>
<script>
const b=[...document.querySelectorAll('.b')];
function run(){b.forEach(x=>x.classList.remove('in'));b.forEach((x,i)=>setTimeout(()=>x.classList.add('in'),120+i*90));}
run();setInterval(run,5000);
</script></body></html>
