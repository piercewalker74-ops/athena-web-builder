<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>mower</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
 .field{position:relative;height:250px;border-radius:16px;overflow:hidden;cursor:none}
 canvas{position:absolute;inset:0;width:100%;height:100%}
 .cap{position:absolute;left:14px;top:12px;z-index:2}
 .hint{font-family:var(--mono);font-size:9px;color:var(--ice);opacity:.55;letter-spacing:.14em;text-align:center}
</style></head>
<body class="demo"><div class="demo-name">m · clear-to-reveal</div>
<div class="stage">
  <div class="field frost"><canvas id="c"></canvas><div class="cap"><span class="chip">◇ drag to clear</span></div></div>
  <div class="hint">move across the field · the mower reveals the finish beneath the frost</div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');let W,H,dpr=Math.min(devicePixelRatio||1,2);
function paintFrost(){ctx.globalCompositeOperation='source-over';
 const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#7fbfe0');g.addColorStop(1,'#a9d8ef');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 for(let i=0;i<400;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.5})`;ctx.fillRect(Math.random()*W,Math.random()*H,2,2);}}
function size(){W=cv.clientWidth;H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);paintFrost();}
size();addEventListener('resize',size);
function clearAt(x,y){ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(x,y,24,0,7);ctx.fill();
 ctx.beginPath();ctx.arc(x,y,30,0,7);ctx.globalAlpha=.3;ctx.fill();ctx.globalAlpha=1;}
let mouse=false;cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();clearAt(e.clientX-r.left,e.clientY-r.top);mouse=true;});
// auto sweep when idle
let t=0,idle=0;setInterval(()=>{idle++;if(idle>40){const y=H*(0.2+((t*0.06)%1)*0.6);const x=(Math.sin(t*0.08)*0.5+0.5)*W;clearAt(x,y);t++;}},30);
cv.addEventListener('mousemove',()=>idle=0);
setInterval(()=>{paintFrost();},9000);
</script></body></html>
