<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>slider</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{display:flex;flex-direction:column;gap:12px;align-items:center}
 .ba{position:relative;width:100%;max-width:420px;height:240px;border-radius:16px;overflow:hidden;cursor:ew-resize;user-select:none}
 .ba .filler{position:absolute;inset:0;border-radius:0}
 .after{clip-path:inset(0 0 0 var(--x,50%))}
 .after:before{background:linear-gradient(140deg,#0a3550,#0c2740 60%,#124a60)}
 .lbl{position:absolute;top:10px;font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--frost);background:rgba(4,18,30,.6);padding:3px 8px;border-radius:6px}
 .l1{left:10px}.l2{right:10px}
 .handle{position:absolute;top:0;bottom:0;left:var(--x,50%);width:2px;background:var(--cyan);box-shadow:var(--glow)}
 .knob{position:absolute;top:50%;left:var(--x,50%);transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;
   background:var(--cyan);display:flex;align-items:center;justify-content:center;color:#04121e;font-size:12px;box-shadow:var(--glow)}
</style></head>
<body class="demo"><div class="demo-name">m · slider</div>
<div class="stage">
  <div class="eyebrow">BEFORE / AFTER</div>
  <div class="ba frost" id="ba">
    <div class="filler before"><span class="tag" style="left:8px;right:auto">BEFORE</span></div>
    <div class="filler after" id="af"></div>
    <div class="lbl l1">BEFORE</div><div class="lbl l2">AFTER</div>
    <div class="handle" id="h"></div><div class="knob" id="k">⟷</div>
  </div>
</div>
<script>
const ba=document.getElementById('ba'),af=document.getElementById('af'),h=document.getElementById('h'),k=document.getElementById('k');
let drag=false;
function set(px){const r=ba.getBoundingClientRect();let p=Math.max(4,Math.min(96,(px-r.left)/r.width*100));
 [af,h,k].forEach(e=>e.style.setProperty('--x',p+'%'));}
ba.addEventListener('mousedown',e=>{drag=true;set(e.clientX);});
addEventListener('mousemove',e=>{if(drag)set(e.clientX);});
addEventListener('mouseup',()=>drag=false);
// idle sweep
let a=0;setInterval(()=>{if(!drag){a+=.02;const r=ba.getBoundingClientRect();set(r.left+r.width*(.5+Math.sin(a)*.34));}},40);
</script></body></html>
