<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>shader</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{height:340px;border-radius:18px;position:relative;overflow:hidden;display:grid;place-items:center}
 canvas{position:absolute;inset:0;width:100%;height:100%}
 .cap{position:relative;text-align:center;mix-blend-mode:screen}
 .fallback{position:absolute;inset:0;background:
   radial-gradient(circle at 30% 30%,#2fe0ff,transparent 45%),
   radial-gradient(circle at 70% 60%,#39d3c9,transparent 45%),#04121e}
</style></head>
<body class="demo"><div class="demo-name">m · shader</div>
<div class="stage frost">
  <div class="fallback"></div>
  <canvas id="c"></canvas>
  <div class="cap"><div class="eyebrow">GLSL FRAGMENT</div><h1 class="big glow">Frost plasma</h1></div>
</div>
<script>
const cv=document.getElementById('c');const gl=cv.getContext('webgl');
if(gl){
 const vs=`attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
 const fs=`precision highp float;uniform vec2 r;uniform float t;
  void main(){vec2 uv=(gl_FragCoord.xy/r-0.5)*vec2(r.x/r.y,1.);
   float v=0.;for(float i=1.;i<5.;i++){v+=sin(uv.x*i*2.4+t)+cos(uv.y*i*2.1-t*1.1);uv+=0.15*vec2(sin(t*.3+i),cos(t*.2+i));}
   v*=.25;vec3 a=vec3(0.05,0.15,0.28),b=vec3(0.18,0.88,1.0),c=vec3(0.22,0.83,0.79);
   vec3 col=mix(a,mix(b,c,0.5+0.5*sin(v*3.14)),0.5+0.5*sin(v*3.0));
   gl_FragColor=vec4(col,1.);}`;
 function sh(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);return s;}
 const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);gl.useProgram(pr);
 const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
 const loc=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
 const uR=gl.getUniformLocation(pr,'r'),uT=gl.getUniformLocation(pr,'t');
 function size(){cv.width=cv.clientWidth;cv.height=cv.clientHeight;gl.viewport(0,0,cv.width,cv.height);}size();addEventListener('resize',size);
 let t=0;function loop(){t+=0.016;gl.uniform2f(uR,cv.width,cv.height);gl.uniform1f(uT,t);gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(loop);}loop();
 document.querySelector('.fallback').style.display='none';
}
</script></body></html>
