<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>parallax</title><link rel="stylesheet" href="../_theme.css">
<style>
 .stage{height:300px;perspective:600px;overflow:hidden;border-radius:16px}
 .scene{position:absolute;inset:0}
 .lyr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:transform .18s ease-out}
 .back .filler{width:100%;height:100%;border-radius:0}
 .mid .blob{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(47,224,255,.35),transparent 65%);filter:blur(6px)}
 .front h1{font-size:44px}
 .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9px;color:var(--ice);opacity:.5;letter-spacing:.16em}
</style></head>
<body class="demo"><div class="demo-name">m · parallax</div>
<div class="stage frost" id="st">
  <div class="scene">
    <div class="lyr back" data-d="8"><div class="filler"><span class="tag">BG</span></div></div>
    <div class="lyr mid" data-d="26"><div class="blob"></div></div>
    <div class="lyr front" data-d="50"><h1 class="big glow">DEPTH</h1></div>
  </div>
  <div class="hint">move cursor · layers drift at different rates</div>
</div>
<script>
const st=document.getElementById('st'),lyr=[...document.querySelectorAll('.lyr')];let tx=0,ty=0,cx=0,cy=0;
st.addEventListener('mousemove',e=>{const r=st.getBoundingClientRect();tx=(e.clientX-r.left)/r.width-.5;ty=(e.clientY-r.top)/r.height-.5;});
st.addEventListener('mouseleave',()=>{tx=0;ty=0;});
function loop(){cx+=(tx-cx)*.08;cy+=(ty-cy)*.08;lyr.forEach(l=>{const d=+l.dataset.d;l.style.transform=`translate(${-cx*d}px,${-cy*d}px)`;});requestAnimationFrame(loop);}
loop();
// auto sway when idle
let a=0;setInterval(()=>{if(tx===0&&ty===0){a+=.03;tx=Math.sin(a)*.4;ty=Math.cos(a*.7)*.3;setTimeout(()=>{tx=0;ty=0;},60);}},60);
</script></body></html>
